<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Squicky STT - Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect
    // Converts path to hash-based routing for createHashRouter compatibility
    var path = window.location.pathname;
    var base = '/Squicky-STT/';
    if (path.startsWith(base)) {
      path = path.slice(base.length - 1);
    }
    window.location.replace(base + '#' + path + window.location.search);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
